<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FLIK — Connexion</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg: #f5f3ee; --text: #1a1a1a; --muted: #aaa; --border: #e0ddd6; }
html, body { height: 100%; background: var(--bg); font-family: 'DM Sans', sans-serif; }

.page {
  min-height: 100dvh;
  max-width: 420px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 32px;
  gap: 32px;
}

.logo {
  font-family: 'Playfair Display', serif;
  font-size: 32px;
  font-weight: 900;
  letter-spacing: 8px;
  color: var(--text);
}

.card {
  width: 100%;
  background: #fff;
  border-radius: 24px;
  border: 0.5px solid var(--border);
  padding: 36px 32px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.06);
}

.card-title {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 3px;
  color: var(--text);
}

.field { display: flex; flex-direction: column; gap: 6px; }
.field label {
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;
}
.field input {
  border: none;
  border-bottom: 1.5px solid var(--border);
  background: transparent;
  font-family: 'Playfair Display', serif;
  font-size: 17px;
  color: var(--text);
  padding: 8px 0;
  outline: none;
  transition: border-color 0.2s;
}
.field input:focus { border-bottom-color: var(--text); }

.btn-primary {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  border: none;
  background: var(--text);
  color: var(--bg);
  font-family: 'Playfair Display', serif;
  font-size: 13px;
  letter-spacing: 3px;
  cursor: pointer;
  transition: opacity 0.15s;
}
.btn-primary:hover { opacity: 0.85; }
.btn-primary:disabled { opacity: 0.4; cursor: default; }

.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  color: var(--muted);
  font-size: 11px;
  letter-spacing: 2px;
}
.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 0.5px;
  background: var(--border);
}

.btn-social {
  width: 100%;
  padding: 12px;
  border-radius: 14px;
  border: 1.5px solid var(--border);
  background: transparent;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  color: var(--text);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  transition: border-color 0.2s;
}
.btn-social:hover { border-color: var(--text); }

.links {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}
.link {
  font-size: 12px;
  color: var(--muted);
  text-decoration: none;
  letter-spacing: 1px;
  transition: color 0.2s;
}
.link:hover { color: var(--text); }
.link strong { color: var(--text); font-weight: 400; }

.error-msg {
  font-size: 12px;
  color: #c0392b;
  letter-spacing: 0.5px;
  display: none;
}
.error-msg.visible { display: block; }

.success-msg {
  font-size: 12px;
  color: #2d6a4f;
  letter-spacing: 0.5px;
  display: none;
}
.success-msg.visible { display: block; }
</style>
</head>
<body>
<script src="auth.js"></script>
<div class="page">
  <div class="logo">FLIK</div>

  <div class="card">
    <div class="card-title">CONNEXION</div>

    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="votre@email.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Mot de passe</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <span class="error-msg" id="error"></span>

    <button class="btn-primary" id="btnLogin" onclick="handleLogin()">SE CONNECTER</button>

    <div class="divider">ou</div>

    <button class="btn-social" onclick="signInGoogle()">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.706A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.038l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.962L3.964 7.294C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
      Continuer avec Google
    </button>

    <button class="btn-social" onclick="signInApple()">
      <svg width="16" height="18" viewBox="0 0 16 18" fill="currentColor"><path d="M13.395 9.446c-.022-2.46 2.01-3.653 2.102-3.71-1.146-1.674-2.927-1.903-3.562-1.926-1.515-.154-2.963.894-3.733.894-.77 0-1.96-.872-3.22-.85C3.18 3.876 1.37 4.994.484 6.73c-1.797 3.117-.461 7.738 1.29 10.272.854 1.238 1.873 2.632 3.21 2.582 1.293-.052 1.78-.838 3.343-.838 1.563 0 2.005.838 3.364.814 1.385-.023 2.265-1.263 3.112-2.504.985-1.435 1.388-2.826 1.41-2.898-.031-.013-2.7-1.037-2.726-4.112zM10.98 2.55C11.664 1.713 12.13.551 11.997-.6c-1.001.042-2.21.668-2.927 1.506-.643.742-1.205 1.928-1.054 3.065 1.115.086 2.258-.566 2.964-1.421z"/></svg>
      Continuer avec Apple
    </button>

    <div class="links">
      <a class="link" href="#" onclick="handleForgot(event)">mot de passe oublié ?</a>
      <span class="success-msg" id="success">Email de réinitialisation envoyé ✓</span>
      <a class="link" href="signup.html">Pas encore de compte ? <strong>S'inscrire</strong></a>
    </div>
  </div>
</div>

<script>
guardAuth();

async function handleLogin() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('btnLogin');
  const errEl    = document.getElementById('error');

  errEl.classList.remove('visible');
  if (!email || !password) { errEl.textContent = 'Remplis tous les champs.'; errEl.classList.add('visible'); return; }

  btn.disabled = true;
  btn.textContent = '...';

  try {
    await signIn(email, password);
    window.location.href = 'flik.html';
  } catch (e) {
    errEl.textContent = 'Email ou mot de passe incorrect.';
    errEl.classList.add('visible');
    btn.disabled = false;
    btn.textContent = 'SE CONNECTER';
  }
}

async function handleForgot(e) {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const errEl = document.getElementById('error');
  const sucEl = document.getElementById('success');
  if (!email) { errEl.textContent = 'Entre ton email d\'abord.'; errEl.classList.add('visible'); return; }
  try {
    await resetPassword(email);
    sucEl.classList.add('visible');
  } catch {
    errEl.textContent = 'Erreur lors de l\'envoi.';
    errEl.classList.add('visible');
  }
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') handleLogin();
});
</script>
</body>
</html>
