<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FLIK — Inscription</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg: #f5f3ee; --text: #1a1a1a; --muted: #aaa; --border: #e0ddd6; }
html, body { height: 100%; background: var(--bg); font-family: 'DM Sans', sans-serif; }

.page {
  min-height: 100dvh;
  max-width: 420px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 32px;
  gap: 32px;
}
.logo {
  font-family: 'Playfair Display', serif;
  font-size: 32px;
  font-weight: 900;
  letter-spacing: 8px;
  color: var(--text);
}
.card {
  width: 100%;
  background: #fff;
  border-radius: 24px;
  border: 0.5px solid var(--border);
  padding: 36px 32px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.06);
}
.card-title {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 3px;
  color: var(--text);
}
.field { display: flex; flex-direction: column; gap: 6px; }
.field label { font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }
.field input {
  border: none;
  border-bottom: 1.5px solid var(--border);
  background: transparent;
  font-family: 'Playfair Display', serif;
  font-size: 17px;
  color: var(--text);
  padding: 8px 0;
  outline: none;
  transition: border-color 0.2s;
}
.field input:focus { border-bottom-color: var(--text); }
.field input.invalid { border-bottom-color: #c0392b; }

.password-hint {
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.5px;
  margin-top: 2px;
}

.btn-primary {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  border: none;
  background: var(--text);
  color: var(--bg);
  font-family: 'Playfair Display', serif;
  font-size: 13px;
  letter-spacing: 3px;
  cursor: pointer;
  transition: opacity 0.15s;
}
.btn-primary:hover { opacity: 0.85; }
.btn-primary:disabled { opacity: 0.4; cursor: default; }

.divider { display: flex; align-items: center; gap: 12px; color: var(--muted); font-size: 11px; letter-spacing: 2px; }
.divider::before, .divider::after { content: ''; flex: 1; height: 0.5px; background: var(--border); }

.btn-social {
  width: 100%;
  padding: 12px;
  border-radius: 14px;
  border: 1.5px solid var(--border);
  background: transparent;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  color: var(--text);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  transition: border-color 0.2s;
}
.btn-social:hover { border-color: var(--text); }

.link { font-size: 12px; color: var(--muted); text-decoration: none; letter-spacing: 1px; display: block; text-align: center; transition: color 0.2s; }
.link:hover { color: var(--text); }
.link strong { color: var(--text); font-weight: 400; }

.error-msg { font-size: 12px; color: #c0392b; letter-spacing: 0.5px; display: none; }
.error-msg.visible { display: block; }

.success-msg {
  font-size: 13px;
  color: #2d6a4f;
  letter-spacing: 0.5px;
  text-align: center;
  font-family: 'Playfair Display', serif;
  display: none;
}
.success-msg.visible { display: block; }
</style>
</head>
<body>
<script src="auth.js"></script>
<div class="page">
  <div class="logo">FLIK</div>

  <div class="card">
    <div class="card-title">S'INSCRIRE</div>

    <div class="field">
      <label>Prénom</label>
      <input type="text" id="name" placeholder="Jean" autocomplete="given-name">
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="votre@email.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Mot de passe</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="new-password" oninput="checkPasswords()">
      <span class="password-hint">8 caractères minimum</span>
    </div>
    <div class="field">
      <label>Confirmer le mot de passe</label>
      <input type="password" id="confirm" placeholder="••••••••" autocomplete="new-password" oninput="checkPasswords()">
    </div>

    <span class="error-msg" id="error"></span>
    <span class="success-msg" id="success">Compte créé ! Vérifie ton email pour confirmer. ✓</span>

    <button class="btn-primary" id="btnSignup" onclick="handleSignup()">CRÉER MON COMPTE</button>

    <div class="divider">ou</div>

    <button class="btn-social" onclick="signInGoogle()">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.706A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.038l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.962L3.964 7.294C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
      Continuer avec Google
    </button>

    <button class="btn-social" onclick="signInApple()">
      <svg width="18" height="18" viewBox="0 0 814 1000"><path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105-43.4-150.3-109.8C34.6 672.2-.8 580.9-.8 494.2c0-203.9 143.1-311.7 284-311.7 75.5 0 138.2 49.5 184.7 49.5 44.2 0 117.7-52.5 208.2-52.5zm-39.7-160.7c39.8-50.6 67.8-121 67.8-191.3 0-9.8-.8-19.7-2.5-28.3-64.6 2.5-140.9 43.7-187.3 99.7-36.6 43.7-70.9 113.5-70.9 184.4 0 10.7 1.9 21.4 2.5 25.4 4.2.6 11.1 1.6 18 1.6 59.6 0 130.3-39.9 172.4-91.5z"/></svg>
      Continuer avec Apple
    </button>

    <a class="link" href="login.html">Déjà un compte ? <strong>Se connecter</strong></a>
  </div>
</div>

<script>
guardAuth();

function checkPasswords() {
  const pass    = document.getElementById('password').value;
  const confirm = document.getElementById('confirm');
  if (confirm.value && confirm.value !== pass) {
    confirm.classList.add('invalid');
  } else {
    confirm.classList.remove('invalid');
  }
}

async function handleSignup() {
  const name     = document.getElementById('name').value.trim();
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const confirm  = document.getElementById('confirm').value;
  const btn      = document.getElementById('btnSignup');
  const errEl    = document.getElementById('error');
  const sucEl    = document.getElementById('success');

  errEl.classList.remove('visible');
  sucEl.classList.remove('visible');

  if (!name || !email || !password || !confirm) {
    errEl.textContent = 'Remplis tous les champs.';
    errEl.classList.add('visible'); return;
  }
  if (password !== confirm) {
    errEl.textContent = 'Les mots de passe ne correspondent pas.';
    errEl.classList.add('visible'); return;
  }
  if (password.length < 8) {
    errEl.textContent = 'Le mot de passe doit contenir au moins 8 caractères.';
    errEl.classList.add('visible'); return;
  }

  btn.disabled = true;
  btn.textContent = '...';

  try {
    await signUp(name, email, password);
    sucEl.classList.add('visible');
    btn.textContent = 'CRÉER MON COMPTE';
  } catch (e) {
    errEl.textContent = e.message || 'Erreur lors de l\'inscription.';
    errEl.classList.add('visible');
    btn.disabled = false;
    btn.textContent = 'CRÉER MON COMPTE';
  }
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') handleSignup();
});
</script>
</body>
</html>
