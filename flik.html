<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FLIK</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700;900&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f3ee;
    --card-bg: #ffffff;
    --card-back: #111111;
    --text: #1a1a1a;
    --muted: #aaa;
    --chain: #e8e2d6;
    --accent: #1a1a1a;
  }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    touch-action: none;
  }

  .app {
    height: 100dvh;
    max-width: 420px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  /* HEADER */
  .header {
    padding: 52px 28px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 900;
    letter-spacing: 6px;
    color: var(--text);
  }
  .add-btn {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: var(--text);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .add-btn:active { transform: scale(0.92); }
  .add-btn svg { width: 16px; height: 16px; stroke: #f5f3ee; stroke-width: 2.5; fill: none; }

  /* ARENA */
  .arena {
    flex: 1;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    perspective: 1200px;
  }

  /* HINTS */
  .hint {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s;
  }
  .hint-left  { left: 20px; top: 50%; transform: translateY(-50%); }
  .hint-right { right: 20px; top: 50%; transform: translateY(-50%); }
  .hint-up    { top: 20px; left: 50%; transform: translateX(-50%); }
  .hint svg { width: 22px; height: 22px; fill: none; stroke-width: 2; }
  .hint span {
    font-family: 'Playfair Display', serif;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .hint-left svg, .hint-left span { stroke: #c0392b; color: #c0392b; }
  .hint-right svg, .hint-right span { stroke: #2d6a4f; color: #2d6a4f; }
  .hint-up svg, .hint-up span { stroke: #1a4a7a; color: #1a4a7a; }

  /* CARD STACK */
  .stack {
    position: relative;
    width: 300px;
    height: 360px;
  }

  .card-wrapper {
    position: absolute;
    width: 300px;
    height: 340px;
    transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
    will-change: transform;
    border-radius: 24px;
    background: var(--card-bg);
    border: 0.5px solid #e0ddd6;
  }

  .card-wrapper.is-back {
    background: #edeae3;
    border-color: #dedad2;
  }

  .card-front {
    position: absolute;
    inset: 0;
    border-radius: 24px;
    padding: 36px 32px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .card-wrapper.is-back .card-front {
    visibility: hidden;
  }

  .card-label {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
  }
  .card-title {
    font-family: 'Playfair Display', serif;
    font-weight: 500;
    color: var(--text);
    line-height: 1.25;
    flex: 1;
    display: flex;
    align-items: center;
  }
  .card-bottom {
    display: flex;
    align-items: center;
    justify-content: flex-end;
  }
  .chain-badge {
    display: flex;
    align-items: center;
    gap: 5px;
    background: var(--chain);
    border-radius: 30px;
    padding: 5px 12px;
  }
  .chain-badge svg { width: 12px; height: 12px; stroke: #888; fill: none; stroke-width: 2; }
  .chain-badge span { font-size: 10px; color: #888; letter-spacing: 1.5px; font-family: 'DM Sans', sans-serif; }

  .counter-area {
    margin-top: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .counter-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .counter-num {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
  }
  .counter-lbl {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }
  .undo-inline {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Playfair Display', serif;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    cursor: pointer;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
    -webkit-tap-highlight-color: transparent;
  }
  .undo-inline.visible {
    opacity: 1;
    pointer-events: all;
  }
  .undo-inline svg {
    width: 13px; height: 13px;
    stroke: var(--muted);
  }
  .undo-inline:active { opacity: 0.5; }

  /* BOTTOM BAR */
  .bottom-bar {
    padding: 12px 32px 36px;
    display: flex;
    align-items: center;
    justify-content: space-around;
    flex-shrink: 0;
  }
  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    opacity: 0.3;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: opacity 0.2s;
  }
  .nav-item.active { opacity: 1; }
  .nav-item svg { width: 22px; height: 22px; fill: none; stroke: var(--text); stroke-width: 1.8; }
  .nav-item span {
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--text);
    text-transform: uppercase;
    font-family: 'Playfair Display', serif;
  }
  .nav-badge {
    position: relative;
  }
  .incubator-count {
    position: absolute;
    top: -4px; right: -8px;
    background: var(--text);
    color: var(--bg);
    font-size: 9px;
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    width: 16px; height: 16px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .incubator-count.visible { opacity: 1; }



  /* CLEARED */
  .cleared-screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.6s ease;
  }
  .cleared-screen.visible { opacity: 1; }
  .cleared-word {
    font-family: 'Playfair Display', serif;
    font-size: 48px;
    font-weight: 900;
    letter-spacing: 10px;
    color: var(--text);
    transform: translateY(20px);
    opacity: 0;
    transition: transform 0.7s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.7s ease;
  }
  .cleared-screen.visible .cleared-word {
    transform: translateY(0);
    opacity: 1;
  }
  .cleared-sub {
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--muted);
    text-transform: uppercase;
    font-family: 'DM Sans', sans-serif;
    opacity: 0;
    transition: opacity 0.7s ease 0.3s;
  }
  .cleared-screen.visible .cleared-sub { opacity: 1; }

  /* ADD MODAL */
  .add-modal {
    position: absolute;
    inset: 0;
    background: rgba(245,243,238,0.97);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
    z-index: 200;
    padding: 40px;
  }
  .add-modal.visible { opacity: 1; pointer-events: all; }
  .add-modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 4px;
    color: var(--text);
    align-self: flex-start;
  }
  .add-input {
    width: 100%;
    border: none;
    border-bottom: 1.5px solid var(--text);
    background: transparent;
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--text);
    padding: 10px 0;
    outline: none;
    letter-spacing: 1px;
  }
  .add-input::placeholder { color: var(--muted); }
  .chain-toggle {
    display: flex;
    align-items: center;
    gap: 12px;
    align-self: flex-start;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .chain-toggle-box {
    width: 20px; height: 20px;
    border: 1.5px solid var(--muted);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, border-color 0.2s;
  }
  .chain-toggle-box.checked {
    background: var(--text);
    border-color: var(--text);
  }
  .chain-toggle-box svg { width: 12px; height: 12px; stroke: #fff; fill: none; stroke-width: 2.5; opacity: 0; transition: opacity 0.2s; }
  .chain-toggle-box.checked svg { opacity: 1; }
  .chain-toggle span {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    font-family: 'DM Sans', sans-serif;
  }
  .modal-actions {
    display: flex;
    gap: 12px;
    width: 100%;
  }
  .modal-btn {
    flex: 1;
    padding: 14px;
    border-radius: 14px;
    border: 1.5px solid var(--text);
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .modal-btn.cancel { background: transparent; color: var(--text); }
  .modal-btn.confirm { background: var(--text); color: var(--bg); }
  .modal-btn:active { transform: scale(0.97); }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="logo">FLIK</div>
    <div style="display:flex;align-items:center;gap:12px;">
      <button onclick="signOut()" style="background:none;border:none;font-family:'DM Sans',sans-serif;font-size:10px;letter-spacing:2px;color:#aaa;cursor:pointer;text-transform:uppercase;-webkit-tap-highlight-color:transparent;">Quitter</button>
      <button class="add-btn" onclick="openModal()" aria-label="Ajouter une tâche">

  <div class="arena" id="arena">

    <div class="hint hint-left" id="hintLeft">

        <div class="incubator-count" id="incubatorCount">0</div>

</div>

<!-- ADD MODAL -->
<div class="add-modal" id="addModal">
  <div class="add-modal-title">NOUVELLE TÂCHE</div>
  <input class="add-input" id="addInput" type="text" placeholder="que faut-il faire ?" maxlength="60">

<script>
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let ctx = null;

function getCtx() {
  if (!ctx) ctx = new AudioCtx();
  return ctx;
}

function playWhoosh() {
  try {
    const c = getCtx();
    const buf = c.createBuffer(1, c.sampleRate * 0.35, c.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) {
      d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 1.8) * 0.35;
    }
    const src = c.createBufferSource();
    src.buffer = buf;
    const filter = c.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.setValueAtTime(1200, c.currentTime);
    filter.frequency.exponentialRampToValueAtTime(400, c.currentTime + 0.35);
    filter.Q.value = 0.7;
    const gain = c.createGain();
    gain.gain.setValueAtTime(0.5, c.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.35);
    src.connect(filter);
    filter.connect(gain);
    gain.connect(c.destination);
    src.start();
  } catch(e) {}
}

function playCrumple() {
  try {
    const c = getCtx();
    const dur = 0.4;
    const buf = c.createBuffer(1, c.sampleRate * dur, c.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) {
      const t = i / d.length;
      const env = Math.sin(Math.PI * t) * Math.pow(1 - t, 0.5);
      d[i] = (Math.random() * 2 - 1) * env * 0.6;
    }
    const src = c.createBufferSource();
    src.buffer = buf;
    const filter = c.createBiquadFilter();
    filter.type = 'highpass';
    filter.frequency.value = 1800;
    const gain = c.createGain();
    gain.gain.setValueAtTime(0.7, c.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
    src.connect(filter);
    filter.connect(gain);
    gain.connect(c.destination);
    src.start();
  } catch(e) {}
}

function playDing() {
  try {
    const c = getCtx();
    const osc = c.createOscillator();
    const osc2 = c.createOscillator();
    const gain = c.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(880, c.currentTime);
    osc.frequency.exponentialRampToValueAtTime(1320, c.currentTime + 0.05);
    osc2.type = 'sine';
    osc2.frequency.setValueAtTime(1320, c.currentTime);
    osc2.frequency.exponentialRampToValueAtTime(1760, c.currentTime + 0.05);
    gain.gain.setValueAtTime(0.0, c.currentTime);
    gain.gain.linearRampToValueAtTime(0.3, c.currentTime + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.8);
    osc.connect(gain);
    osc2.connect(gain);
    gain.connect(c.destination);
    osc.start(); osc2.start();
    osc.stop(c.currentTime + 0.8);
    osc2.stop(c.currentTime + 0.8);
  } catch(e) {}
}

let queue = [
  { title: "Payer la LAMAL", hasChain: true },
  { title: "Commander des chaussures", hasChain: false },
  { title: "Appeler le dentiste", hasChain: false },
  { title: "Renouveler le passeport", hasChain: true },
  { title: "Réserver le médecin", hasChain: false },
  { title: "Faire les courses", hasChain: false },
  { title: "Envoyer le mail RH", hasChain: true },
];

let removed = null;
let undoTimer = null;
let animating = false;
let chainChecked = false;
let activeDragEl = null;

const stackEl = document.getElementById('stack');

function updateCounters() {
  document.getElementById('queueCount').textContent = queue.length;
}

function makeFontSize(title) {
  if (title.length < 18) return '26px';
  if (title.length < 35) return '21px';
  return '17px';
}

function makeCard(task, idx, total) {
  const wrapper = document.createElement('div');
  wrapper.className = 'card-wrapper';
  wrapper.style.zIndex = idx + 1;

  const isBack = idx < total - 1;

  // idx 0 = furthest back, idx total-1 = top card
  wrapper.style.zIndex = idx + 1;

  if (isBack) {
    wrapper.classList.add('is-back');
    const depth = total - 1 - idx;
    const offset = depth * 10;
    const scale = 1 - depth * 0.04;
    wrapper.style.transform = `translateY(${offset}px) scale(${scale})`;
  } else {
    wrapper.style.transform = 'translateY(0) scale(1)';
  }

  const front = document.createElement('div');
  front.className = 'card-front';
  front.innerHTML = `
    <div class="card-label">tâche</div>
    <div class="card-title" style="font-size:${makeFontSize(task.title)}">${task.title}</div>
    <div class="card-bottom">
      ${task.hasChain ? `<div class="chain-badge">
        <svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        <span>action</span>
      </div>` : ''}
    </div>
  `;

  wrapper.appendChild(front);
  return wrapper;
}

function renderStack() {
  stackEl.innerHTML = '';
  if (queue.length === 0) {
    showCleared();
    updateCounters();
    return;
  }
  document.getElementById('clearedScreen').classList.remove('visible');
  const visible = queue.slice(0, 3);
  visible.forEach((task, i) => {
    stackEl.appendChild(makeCard(task, i, visible.length));
  });
  updateCounters();
}

function getTopCard() {
  return stackEl.lastElementChild;
}

function setupDrag(el) {
  if (!el) return;
  activeDragEl = el;
  let sx = 0, sy = 0, cx = 0, cy = 0, down = false;

  el.style.cursor = 'grab';

  function onStart(ex, ey) {
    if (animating) return;
    down = true;
    sx = ex; sy = ey; cx = 0; cy = 0;
    el.style.transition = 'none';
  }

  function onMove(ex, ey) {
    if (!down) return;
    cx = ex - sx; cy = ey - sy;
    const rot = cx * 0.06;
    el.style.transform = `rotate(${rot}deg) translate(${cx}px,${cy}px)`;
    document.getElementById('hintLeft').style.opacity = cx < -40 ? Math.min(0.9, (-cx-40)/80) : 0;
    document.getElementById('hintRight').style.opacity = cx > 40 ? Math.min(0.9, (cx-40)/80) : 0;
    document.getElementById('hintUp').style.opacity = cy < -40 ? Math.min(0.9, (-cy-40)/80) : 0;
  }

  function onEnd() {
    if (!down) return;
    down = false;
    document.getElementById('hintLeft').style.opacity = 0;
    document.getElementById('hintRight').style.opacity = 0;
    document.getElementById('hintUp').style.opacity = 0;

    // Remove all listeners immediately to prevent ghost swipes
    cleanup();

    if (cx < -80) doSwipe('left', el);
    else if (cx > 80) doSwipe('right', el);
    else if (cy < -80) doSwipe('up', el);
    else {
      el.style.transition = 'transform 0.3s ease';
      el.style.transform = 'translateY(0) scale(1)';
    }
    cx = 0; cy = 0;
  }

  function onMouseMove(e) { onMove(e.clientX, e.clientY); }
  function onTouchMove(e) { e.preventDefault(); onMove(e.touches[0].clientX, e.touches[0].clientY); }
  function onMouseUp() { onEnd(); }
  function onTouchEnd() { onEnd(); }

  function cleanup() {
    window.removeEventListener('mousemove', onMouseMove);
    window.removeEventListener('touchmove', onTouchMove);
    window.removeEventListener('mouseup', onMouseUp);
    window.removeEventListener('touchend', onTouchEnd);
  }

  el.addEventListener('mousedown', e => { e.preventDefault(); onStart(e.clientX, e.clientY); });
  el.addEventListener('touchstart', e => { e.preventDefault(); onStart(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
  window.addEventListener('mousemove', onMouseMove);
  window.addEventListener('touchmove', onTouchMove, { passive: false });
  window.addEventListener('mouseup', onMouseUp);
  window.addEventListener('touchend', onTouchEnd);
}

function doSwipe(dir, el) {
  animating = true;
  el.style.transition = 'transform 0.38s cubic-bezier(0.4,0,1,1)';

  if (dir === 'left') {
    playCrumple();
    el.style.transform = 'rotate(-28deg) translate(-600px, 60px)';
    removed = queue.shift();
    showUndo();
  } else if (dir === 'right') {
    playWhoosh();
    el.style.transform = 'rotate(20deg) translate(600px, -40px)';
    const t = queue.shift();
    // Insert immediately at a random position in the remaining queue (not at front)
    const pos = queue.length === 0 ? 0 : Math.floor(Math.random() * queue.length) + 1;
    queue.splice(pos, 0, t);
    updateCounters();
  } else if (dir === 'up') {
    playDing();
    el.style.transform = 'translate(0, -700px) scale(0.8)';
    queue.shift();
  }

  setTimeout(() => {
    animating = false;
    flipAndLoad();
  }, 380);
}

function flipAndLoad() {
  if (queue.length === 0) {
    renderStack();
    return;
  }
  renderStack();
  const newTop = getTopCard();
  if (!newTop) return;
  newTop.style.transition = 'none';
  const visible = queue.slice(0, 3);
  const offset = (visible.length - 1) * 10;
  const scale = 1 - (visible.length - 1) * 0.04;
  newTop.style.transform = `translateY(${offset}px) scale(${scale})`;
  newTop.style.opacity = '0.6';

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      newTop.style.transition = 'transform 0.45s cubic-bezier(0.4,0,0.2,1), opacity 0.35s ease';
      newTop.style.transform = 'translateY(0) scale(1)';
      newTop.style.opacity = '1';
      newTop.classList.remove('is-back');
      setTimeout(() => setupDrag(newTop), 460);
    });
  });
}

function showCleared() {
  const s = document.getElementById('clearedScreen');
  s.classList.add('visible');
}

function showUndo() {
  const btn = document.getElementById('undoInline');
  btn.classList.add('visible');
  if (undoTimer) clearTimeout(undoTimer);
  undoTimer = setTimeout(() => {
    btn.classList.remove('visible');
    removed = null;
  }, 5000);
}

function undoDelete() {
  if (!removed) return;
  queue.unshift(removed);
  removed = null;
  document.getElementById('undoInline').classList.remove('visible');
  if (undoTimer) clearTimeout(undoTimer);
  flipAndLoad();
}

function openModal() {
  document.getElementById('addModal').classList.add('visible');
  setTimeout(() => document.getElementById('addInput').focus(), 100);
}

function closeModal() {
  document.getElementById('addModal').classList.remove('visible');
  document.getElementById('addInput').value = '';
  chainChecked = false;
  document.getElementById('chainBox').classList.remove('checked');
}

function toggleChain() {
  chainChecked = !chainChecked;
  document.getElementById('chainBox').classList.toggle('checked', chainChecked);
}

function confirmAdd() {
  const val = document.getElementById('addInput').value.trim();
  if (!val) return;
  queue.push({ title: val, hasChain: chainChecked });
  closeModal();
  if (queue.length <= 3) {
    renderStack();
    setTimeout(() => setupDrag(getTopCard()), 700);
  } else {
    updateCounters();
  }
}

document.getElementById('addInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmAdd();
  if (e.key === 'Escape') closeModal();
});

// ── Auth + chargement des tâches depuis Supabase ─────────────
async function init() {
  const session = await guardAuth();
  if (!session) return; // redirigé vers login.html

  // Bouton déconnexion discret dans le header
  const header = document.querySelector('.header');
  const logoutBtn = document.createElement('button');
  logoutBtn.textContent = 'Quitter';
  logoutBtn.style.cssText = 'background:none;border:none;font-family:"DM Sans",sans-serif;font-size:10px;letter-spacing:2px;color:#aaa;cursor:pointer;text-transform:uppercase;';
  logoutBtn.onclick = signOut;
  header.insertBefore(logoutBtn, header.querySelector('.add-btn'));

  // Charger les tâches de l'utilisateur
  try {
    const saved = await loadTasks();
    if (saved && saved.length > 0) {
      queue = saved.map(r => ({
        id:        r.task_id || String(r.id),
        title:     r.title,
        hasChain:  r.has_chain,
        chainNote: r.chain_note || '',
      }));
    }
  } catch(e) {
    console.warn('Impossible de charger les tâches:', e.message);
  }

  renderStack();
  setTimeout(() => setupDrag(getTopCard()), 100);
}

// Sauvegarder automatiquement après chaque action
function autoSave() {
  saveTasks(queue).catch(() => {});
}

init();
</script>
